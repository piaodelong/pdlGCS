name: Windows Build (pdlGCS)

# ---------------------------------------------------------------------------
# pdlGCS 定制版 Windows .exe 安装包自动构建
# ---------------------------------------------------------------------------
#  - Runner : windows-2022 (自带 MSVC 2022、NSIS 3.x、CMake、Ninja)
#  - Qt     : 6.10.2 (与仓库 .github/build-config.json 保持一致)
#  - 依赖    : GStreamer 1.22.12 (MSVC x86_64)
#  - 产物    : pdlGCS-installer-AMD64.exe (CPack NSIS 生成)
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: false
        default: 'Release'
        type: choice
        options: [Release, Debug]
      enable_gstreamer:
        description: '是否启用 GStreamer 视频流 (关闭可显著加快构建)'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64 (${{ inputs.build_type || 'Release' }})
    runs-on: windows-2022
    timeout-minutes: 120

    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
      ENABLE_GSTREAMER: ${{ inputs.enable_gstreamer == false && 'OFF' || 'ON' }}
      QT_VERSION: '6.10.2'
      QT_ARCH: 'win64_msvc2022_64'
      QT_MODULES: 'qtcharts qtlocation qtpositioning qtspeech qt5compat qtmultimedia qtserialport qtimageformats qtshadertools qtconnectivity qtquick3d qtsensors qtscxml qtwebsockets qthttpserver'
      GSTREAMER_VERSION: '1.22.12'

    steps:
      # ---------------------------------------------------------------------
      # 1. 拉取源码 (含 submodules、tags，用于版本号计算)
      # ---------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      # ---------------------------------------------------------------------
      # 2. 安装 Python (QGC 的依赖安装脚本 / aqtinstall 需要)
      # ---------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ---------------------------------------------------------------------
      # 3. 配置 MSVC 2022 开发环境 (cl.exe / link.exe / Windows SDK)
      # ---------------------------------------------------------------------
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------------------------------------------------------------------
      # 4. 安装 Qt 6.10.2 (经 aqtinstall, 带缓存)
      # ---------------------------------------------------------------------
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}
          setup-python: false

      # ---------------------------------------------------------------------
      # 5. 安装 GStreamer (用仓库自带脚本, 版本锁定在 build-config.json)
      # ---------------------------------------------------------------------
      - name: Install GStreamer ${{ env.GSTREAMER_VERSION }}
        if: env.ENABLE_GSTREAMER == 'ON'
        shell: pwsh
        run: |
          python tools/setup/install_dependencies.py `
            --platform windows `
            --gstreamer-version ${{ env.GSTREAMER_VERSION }}

      # ---------------------------------------------------------------------
      # 6. 校验 NSIS (windows-2022 runner 自带 NSIS 3.x, 保险起见验证一次)
      # ---------------------------------------------------------------------
      - name: Verify NSIS availability
        shell: pwsh
        run: |
          $nsis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if (-not $nsis) {
            Write-Host "NSIS not on PATH, installing via Chocolatey..."
            choco install nsis --no-progress -y
          } else {
            Write-Host "NSIS found: $($nsis.Source)"
            makensis.exe /VERSION
          }

      # ---------------------------------------------------------------------
      # 7. CMake Configure (启用定制目录、关闭调试器)
      # ---------------------------------------------------------------------
      - name: CMake Configure
        shell: cmd
        run: |
          cmake -S . -B build ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DQGC_STABLE_BUILD=ON ^
            -DQGC_ENABLE_GST_VIDEOSTREAMING=%ENABLE_GSTREAMER% ^
            -DQGC_BUILD_TESTING=OFF

      # ---------------------------------------------------------------------
      # 8. 编译
      # ---------------------------------------------------------------------
      - name: CMake Build
        shell: cmd
        run: cmake --build build --config %BUILD_TYPE% --parallel

      # ---------------------------------------------------------------------
      # 9. 生成安装包 (QGC 的 install 规则会自动调用 NSIS 打出 .exe)
      # ---------------------------------------------------------------------
      - name: Create NSIS Installer
        shell: cmd
        working-directory: build
        run: cmake --install . --config %BUILD_TYPE%

      # ---------------------------------------------------------------------
      # 10. 定位产物 (文件名形如 pdlGCS-installer-AMD64.exe)
      # ---------------------------------------------------------------------
      - name: Locate installer
        id: locate
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path build -Filter "*installer*.exe" -Recurse |
                       Sort-Object Length -Descending |
                       Select-Object -First 1
          if (-not $installer) {
            Write-Error "Installer .exe not found under build/"
            exit 1
          }
          Write-Host "Installer: $($installer.FullName) ($([math]::Round($installer.Length/1MB,1)) MB)"
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_name=$($installer.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ---------------------------------------------------------------------
      # 11. 上传为 Artifact (可在 Actions 页面直接下载)
      # ---------------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdlGCS-Windows-${{ env.BUILD_TYPE }}-${{ github.sha }}
          path: ${{ steps.locate.outputs.installer_path }}
          if-no-files-found: error
          retention-days: 30

      # ---------------------------------------------------------------------
      # 12. (可选) 打 tag 时自动发布 GitHub Release
      # ---------------------------------------------------------------------
      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.locate.outputs.installer_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
